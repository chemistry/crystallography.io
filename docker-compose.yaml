services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: always
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - net
    deploy:
      placement:
        constraints:
          - node.role == manager

  mongo:
    image: mongo:7
    restart: always
    ports:
      - 27017:27017
    volumes:
      - dbdata:/data/db
    env_file:
      - ./.env
    networks:
      - net
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
    command: 'redis-server --requirepass "${REDIS_PASSWORD}"'
    networks:
      - net
      - traefik-public
    env_file:
      - ./.env
    deploy:
      placement:
        constraints:
          - node.role == manager

  structure-to-index:
    image: ghcr.io/chemistry/structure-to-index:latest
    restart: always
    build:
      context: ./packages/containers/structure-to-index
      dockerfile: Dockerfile
    networks:
      - net
    env_file:
      - ./.env
    deploy:
      mode: replicated
      replicas: 4
    depends_on:
      - rabbitmq
      - mongo

  disk-to-db:
    image: ghcr.io/chemistry/disk-to-db:latest
    restart: always
    volumes:
      - cod-data:/home/data
    env_file:
      - ./.env
    networks:
      - net
    build:
      context: ./packages/containers/disk-to-db
      dockerfile: Dockerfile
    deploy:
      mode: replicated
      replicas: 4
    depends_on:
      - rabbitmq
      - mongo

  maintenance:
    image: ghcr.io/chemistry/maintenance:latest
    restart: always
    build:
      context: ./packages/containers/maintenance
      dockerfile: Dockerfile
    networks:
      - net
    env_file:
      - ./.env
    depends_on:
      - mongo

  cod-to-disk:
    image: ghcr.io/chemistry/cod-to-disk:latest
    restart: always
    volumes:
      - cod-data:/home/data
    networks:
      - net
    env_file:
      - ./.env
    build:
      context: ./packages/containers/cod-to-disk
      dockerfile: Dockerfile
    depends_on:
      - rabbitmq

  web:
    image: ghcr.io/chemistry/c14-web:latest
    restart: always
    build:
      context: ./packages/containers/c14-web
      dockerfile: Dockerfile
    networks:
      - net
      - traefik-public
    env_file:
      - ./.env
    environment:
      - PORT=8060
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.web-http.rule=Host(`crystallography.io`)
        - traefik.http.routers.web-http.entrypoints=http
        - traefik.http.routers.web-http.middlewares=https-redirect
        - traefik.http.routers.web-https.priority=10
        - traefik.http.routers.web-https.rule=Host(`crystallography.io`)
        - traefik.http.routers.web-https.entrypoints=https
        - traefik.http.routers.web-https.tls=true
        - traefik.http.routers.web-https.tls.certresolver=le
        - traefik.http.services.web.loadbalancer.server.port=8060

  api:
    image: ghcr.io/chemistry/c14-api:latest
    restart: always
    volumes:
      - cod-data:/home/data
    build:
      context: ./packages/containers/c14-api
      dockerfile: Dockerfile
    networks:
      - net
      - traefik-public
    env_file:
      - ./.env
    environment:
      - PORT=8070
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.api-https.rule=(Host(`crystallography.io`) && (PathPrefix(`/api`) || PathPrefix(`/sitemap`) || PathPrefix(`/cif`)))
        - traefik.http.routers.api-https.priority=20
        - traefik.http.routers.api-https.entrypoints=https
        - traefik.http.routers.api-https.tls=true
        - traefik.http.routers.api-https.tls.certresolver=le
        - traefik.http.services.api.loadbalancer.server.port=8070
    depends_on:
      - mongo

  searchrouter:
    image: ghcr.io/chemistry/searchrouter:latest
    restart: always
    build:
      context: ./packages/containers/searchrouter
      dockerfile: Dockerfile
    networks:
      - net
      - traefik-public
    env_file:
      - ./.env
    environment:
      - PORT=8050
    depends_on:
      - mongo
      - redis
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.search-https.rule=(Host(`crystallography.io`) && (PathPrefix(`/api/v1/search/structure`) || PathPrefix(`/api/v1/live`)))
        - traefik.http.routers.search-https.entrypoints=https,ws,wss
        - traefik.http.routers.search-https.tls=true
        - traefik.http.routers.search-https.priority=40
        - traefik.http.routers.search-https.tls.certresolver=le
        - traefik.http.services.search.loadbalancer.server.port=8050

  searchworker:
    image: ghcr.io/chemistry/searchworker:latest
    restart: always
    build:
      context: ./packages/containers/searchworker
      dockerfile: Dockerfile
    networks:
      - net
    env_file:
      - ./.env
    depends_on:
      - mongo
      - redis

networks:
  net:
  traefik-public:
    external: true

volumes:
  cod-data:
  dbdata:
  redisdata:
