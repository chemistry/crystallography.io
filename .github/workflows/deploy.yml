name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'packages/containers/**'
      - 'docker-compose.yaml'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  STACK_NAME: crystallography-io
  REMOTE_DIR: /opt/crystallography.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          docker compose build
          docker compose push

      - name: Generate .env file
        run: |
          cat > .env.production << EOF
          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGO_INITDB_HOST=mongo
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_HOST=rabbitmq
          RABBITMQ_PORT=5672
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_PORT=8070
          SEARCH_PORT=8050
          WEB_PORT=3000
          EOF
          sed -i 's/^          //' .env.production

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yaml,.env.production
          target: ${{ env.REMOTE_DIR }}
          overwrite: true

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          envs: REGISTRY,STACK_NAME,REMOTE_DIR
          script: |
            cd $REMOTE_DIR

            # Use generated .env
            mv -f .env.production .env
            chmod 600 .env

            # Authenticate with GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull all images before deploying
            docker compose pull

            # Deploy stack
            docker stack deploy -c docker-compose.yaml $STACK_NAME --with-registry-auth

            # Force update all services to pull latest images
            for service in $(docker stack services $STACK_NAME --format '{{.Name}}'); do
              docker service update --force "$service" 2>/dev/null || true
            done

            # Cleanup old unused images
            docker image prune -f

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Verifying deployment..."
          EXPECTED="${{ github.sha }}"
          for i in $(seq 1 30); do
            LIVE_COMMIT=$(curl -sf --resolve "crystallography.io:443:${DEPLOY_HOST}" "https://crystallography.io/hc" 2>/dev/null | jq -r '.commit // empty') || true
            if [ "$LIVE_COMMIT" = "$EXPECTED" ]; then
              echo "Deployment verified! Live commit: ${LIVE_COMMIT:0:8}"
              exit 0
            fi
            echo "Attempt $i/30 - got: ${LIVE_COMMIT:-no response}, want: ${EXPECTED:0:8}"
            sleep 10
          done
          echo "Could not verify deployment within 5 minutes"
          exit 1

  e2e:
    needs: build-and-deploy
    uses: ./.github/workflows/e2e.yml
