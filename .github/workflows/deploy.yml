name: Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'packages/containers/**'
      - 'docker-compose.yaml'

env:
  REGISTRY: ghcr.io
  STACK_NAME: crystallography-io
  REMOTE_DIR: /opt/crystallography.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          docker compose build
          docker compose push

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yaml,.env.production
          target: ${{ env.REMOTE_DIR }}
          overwrite: true

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REGISTRY,STACK_NAME,REMOTE_DIR
          script: |
            docker image prune -af
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd $REMOTE_DIR

            docker stack deploy -c docker-compose.yaml $STACK_NAME --with-registry-auth

            # Force update all services to pull latest images
            for service in $(docker stack services $STACK_NAME --format '{{.Name}}'); do
              docker service update --force "$service" 2>/dev/null || true
            done
