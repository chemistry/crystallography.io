name: Seed Import

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Files per RabbitMQ message'
        required: false
        default: '100'

env:
  STACK_NAME: crystallography-io

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run seed import
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 120m
          script: |
            BATCH_SIZE=${{ github.event.inputs.batch_size || '100' }}
            QUEUE_NAME="COD_FILE_CHANGED"
            # Host path where CIF files are stored
            HOST_DATA_PATH="/mnt/data/cif"
            # Container path (bind mount: /mnt/data -> /home/data)
            CONTAINER_DATA_PATH="/home/data/cif"

            echo "=== Checking prerequisites ==="
            RABBIT_CONTAINER=$(docker ps --filter "name=${{ env.STACK_NAME }}_rabbitmq" --format '{{.ID}}' | head -1)
            [ -n "$RABBIT_CONTAINER" ] || { echo "ERROR: RabbitMQ container not running"; exit 1; }
            [ -d "$HOST_DATA_PATH" ] || { echo "ERROR: CIF data not found at $HOST_DATA_PATH"; exit 1; }

            # Declare queue
            docker exec "$RABBIT_CONTAINER" rabbitmqadmin declare queue name="$QUEUE_NAME" durable=true 2>&1

            # Force restart disk-to-db to ensure consumers are connected
            docker service update --force ${{ env.STACK_NAME }}_disk-to-db 2>&1 | tail -1

            TOTAL=$(find "$HOST_DATA_PATH" -name "*.cif" | wc -l)
            echo "Found $TOTAL CIF files to import"

            # Generate all messages and publish via rabbitmqadmin
            COUNT=0
            BATCH=""
            BATCH_COUNT=0

            find "$HOST_DATA_PATH" -name "*.cif" | sort | while IFS= read -r filepath; do
              filename=$(basename "$filepath" .cif)
              # Convert host path to container path for disk-to-db
              container_filepath="${filepath/$HOST_DATA_PATH/$CONTAINER_DATA_PATH}"

              if [ "$BATCH_COUNT" -eq 0 ]; then
                BATCH="[{\"fileName\":\"$container_filepath\",\"codId\":\"$filename\"}"
              else
                BATCH="${BATCH},{\"fileName\":\"$container_filepath\",\"codId\":\"$filename\"}"
              fi
              BATCH_COUNT=$((BATCH_COUNT + 1))

              if [ "$BATCH_COUNT" -ge "$BATCH_SIZE" ]; then
                BATCH="${BATCH}]"
                docker exec "$RABBIT_CONTAINER" rabbitmqadmin publish \
                  exchange=amq.default routing_key="$QUEUE_NAME" \
                  payload="$BATCH" 2>/dev/null

                COUNT=$((COUNT + BATCH_SIZE))
                BATCH_COUNT=0

                if [ $((COUNT % 10000)) -eq 0 ]; then
                  QUEUE_DEPTH=$(docker exec "$RABBIT_CONTAINER" rabbitmqctl list_queues --quiet 2>/dev/null | grep "$QUEUE_NAME" | awk '{print $2}')
                  echo "Queued $COUNT / $TOTAL ($(( COUNT * 100 / TOTAL ))%) | Queue depth: $QUEUE_DEPTH"
                fi
              fi
            done

            # Send remaining batch
            if [ "$BATCH_COUNT" -gt 0 ]; then
              BATCH="${BATCH}]"
              docker exec "$RABBIT_CONTAINER" rabbitmqadmin publish \
                exchange=amq.default routing_key="$QUEUE_NAME" \
                payload="$BATCH" 2>/dev/null
              COUNT=$((COUNT + BATCH_COUNT))
            fi

            echo "=== Seed import complete: $COUNT files queued ==="
            docker exec "$RABBIT_CONTAINER" rabbitmqctl list_queues 2>&1
